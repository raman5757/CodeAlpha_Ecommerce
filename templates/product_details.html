{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<div class="row">

<div class="col-md-5">

<img src="{{ product.image }}"
class="img-fluid">

</div>

<div class="col-md-7">

<h2>{{ product.name }}</h2>

<h4 class="text-success">
₹ {{ product.price }}
</h4>

<p>
<b>Category :</b>
{{ product.category }}
</p>

<p>
{{ product.description }}
</p>

<a href="/add-to-cart/{{ product._id }}"
class="btn btn-success">

Add to Cart

</a>

</div>

</div>

</div>

{% endblock %}
